name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features
      - run: cargo run -p prog-cli -- --help

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features

  dirty-checkout-isolation:
    # CLI tests must never observe the checkout that runs them. Keep an
    # untracked file changing at the repository root while the suite runs so
    # inherited-CWD regressions fail deterministically in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test from a dirty, changing checkout
        shell: bash
        run: |
          set -euo pipefail
          dirty_file="$GITHUB_WORKSPACE/.prog-ci-dirty-worktree"
          (
            while true; do
              printf '%s\n' "$(date +%s%N)" > "$dirty_file"
              sleep 0.01
            done
          ) &
          writer_pid=$!
          trap 'kill "$writer_pid" 2>/dev/null || true; wait "$writer_pid" 2>/dev/null || true' EXIT
          cargo test --workspace --all-targets --all-features

  msrv:
    # Verifies the rust-version pin declared in Cargo.toml actually builds and
    # tests cleanly on the declared floor, rather than being dead metadata.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - run: cargo +1.89.0 build --workspace --all-features
      - run: cargo +1.89.0 test --workspace

  version-consistency:
    # Guards against drift between Cargo.toml version, the CHANGELOG, and git
    # tags. See .github/scripts/check-version-consistency.sh for the contract.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-version-consistency.sh

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
